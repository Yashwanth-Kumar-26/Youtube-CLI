name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y mpv chafa

    - name: Install macOS Dependencies
      if: runner.os == 'macOS'
      run: |
        brew install mpv chafa

    - name: Install Windows Dependencies
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        winget install -e --id shinchiro.mpv --accept-package-agreements --accept-source-agreements
        winget install -e --id hpjansson.Chafa --accept-package-agreements --accept-source-agreements

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio textual[dev]

    - name: Run Tests
  # We use PYTHONPATH=. to ensure local modules are findable
      run: |
        python -m pytest
      env:
        PYTHONPATH: .
